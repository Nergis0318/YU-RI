[settings]
host = "0.0.0.0"
port = 8080
log = "info"

[settings.cache]
dir = "/path/to/cache"
size = 1000000000
ttl = 3600
policy = "lru"

[settings.cache.interval]
enable = false
time = 300

[upstream]
url = "https://example.kr"

[[upstream.sub]]
url = "https://example.com/asdadsad"
path = "/path/to/subpath"

[[upstream.sub]]
url = "https://example.net/som/orgin/path"
path = "/path/to/another/subpath"

[[upstream.sub]]
url = "http://example.org/yet"
path = "/path/to/yet/another/subpath"
