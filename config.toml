[settings]
host = "0.0.0.0"
port = 8152
log = "info"

[settings.cache]
dir = "cache"
size = 10485760
ttl = 60
policy = "lru"
# cron = "0 0 */6 * * * *"
# body_limit = 5368709120

[settings.cache.interval]
enable = false
time = 300

[upstream]
url = "https://mirror.xtom.jp"

[[upstream.sub]]
url = "https://packages.termux.dev/apt"
path = "/termux"

[[upstream.sub]]
url = "https://example.net/som/orgin/path"
path = "/path/to/another/subpath"

[[upstream.sub]]
url = "http://example.org/yet"
path = "/path/to/yet/another/subpath"
